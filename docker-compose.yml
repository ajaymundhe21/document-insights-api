services:
  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - redis
    env_file:
      - .env
    restart: always

  worker:
    build: .
    command: python -m app.worker
    depends_on:
      - redis
    env_file:
      - .env
    restart: always

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: always